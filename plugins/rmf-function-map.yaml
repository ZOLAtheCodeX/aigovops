# NIST AI RMF 1.0 four-function tagging for the AIGovOps plugin catalogue.
# Every plugin tags which function(s) it contributes to. Govern is
# typically cross-cutting (appears on many). Map/Measure/Manage cycle
# around specific decisions.
#
# Source: NIST AI Risk Management Framework 1.0, Section 5 (Core).
# Function definitions from NIST AI RMF 1.0, Sections 5.1 through 5.4.

functions:
  govern:
    description: Organizational culture, leadership, policies, roles
    citation: "NIST AI RMF 1.0, Section 5.1 (Govern)"
  map:
    description: Context establishment, categorization, risk identification
    citation: "NIST AI RMF 1.0, Section 5.2 (Map)"
  measure:
    description: Metrics, testing, evaluation, measurement feedback
    citation: "NIST AI RMF 1.0, Section 5.3 (Measure)"
  manage:
    description: Risk treatment, incident response, continual improvement
    citation: "NIST AI RMF 1.0, Section 5.4 (Manage)"

plugin_tags:
  ai-system-inventory-maintainer:
    functions: [govern, map]
    primary: map
    rationale: Inventory establishes context (Map) under governance (Govern)
  applicability-checker:
    functions: [govern, map]
    primary: map
  high-risk-classifier:
    functions: [map]
    primary: map
  risk-register-builder:
