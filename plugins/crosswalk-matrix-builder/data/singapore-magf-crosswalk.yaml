# Singapore Model AI Governance Framework 2e (MAGF 2e, 2020) crosswalk to
# ISO/IEC 42001:2023, NIST AI RMF 1.0, and the EU AI Act. Plus MAS FEAT
# Principles (2018) crosswalk to the same targets.
#
# MAGF is less prescriptive than ISO 42001 and NIST AI RMF; most mappings
# are `satisfies` or `partial-satisfaction`. AI Verify technical testing and
# Veritas fairness methodology have no direct ISO equivalent and are
# represented as `complementary`.
#
# Sources:
# - Singapore MAGF 2e (IMDA/PDPC, January 2020)
# - MAS "Principles to Promote Fairness, Ethics, Accountability and
#   Transparency (FEAT) in the Use of Artificial Intelligence and Data
#   Analytics in Singapore's Financial Sector" (12 November 2018)
# - AI Verify Foundation AI Verify framework (IMDA, 2024)
# - MAS Veritas Document Series (2019 through 2022)
#
# See SCHEMA.md for invariants.

