      - "information-integrity row citations include 'Cal. Bus. & Prof. Code Section 22757'"
      - "data-privacy row citations include 'Cal. Civ. Code Section 1798.140(v)'"
      - "residual_risk_flags contains a critical entry for intellectual-property (residual_score 16)"
      - "summary.critical_flag_count >= 1"
      - "warnings include 'CRITICAL' string referencing intellectual-property"
    clause_references:
      - "NIST AI 600-1, Section 2"
      - "NIST AI 600-1, Appendix A"
      - "NIST AI RMF, GOVERN 1.4"
      - "NIST AI RMF, GOVERN 6.1"
      - "Cal. Bus. & Prof. Code Section 22757"
      - "California AB 2013, Section 1"
      - "Cal. Civ. Code Section 1798.140(v)"
    status: validated
