# AIGovOps Bundle: ISO 42001 Certification Readiness
# Status: active.

name: iso42001-cert-readiness
version: 0.1.0
description: >
  Pre-certification readiness check for ISO/IEC 42001:2023 audit.
  Loads the iso42001 skill, runs the audit-log-generator plugin against
  the AI system inventory, generates a Statement of Applicability draft,
  and produces a gap assessment against all 38 Annex A controls.

skills:
  - name: iso42001
    version: ">=0.2.0"

plugins:
  - name: audit-log-generator
    version: ">=0.2.0"
  - name: soa-generator
    version: ">=0.2.0"
  - name: gap-assessment
    version: ">=0.2.0"

config:
  output_format: markdown
  include_soa_draft: true
  include_gap_assessment: true
  include_aisia_template: true
